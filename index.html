<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>因数分解ハンターズ Ver1.0</title>

<style>
*{box-sizing:border-box}
body{
margin:0;
font-family:system-ui,sans-serif;
background:linear-gradient(#1e3a8a,#047857,#111827);
min-height:100vh;
color:white;
}
.app{
max-width:1000px;
margin:auto;
padding:20px;
}
.card{
background:white;
color:#111;
border-radius:24px;
padding:24px;
margin:20px 0;
}
.title{
text-align:center;
font-size:42px;
font-weight:900;
}
.sub{
text-align:center;
opacity:.9;
}
.row{
display:flex;
gap:10px;
flex-wrap:wrap;
}
button{
padding:12px 16px;
border:0;
border-radius:12px;
cursor:pointer;
font-weight:700;
}
.green{background:#10b981;color:white}
.blue{background:#2563eb;color:white}
.yellow{background:#eab308;color:white}
.choice{
background:#eee;
}
.selected{
background:#10b981;
color:white;
}
input{
width:100%;
padding:14px;
border-radius:12px;
border:1px solid #ccc;
margin-top:10px;
}
.bar{
height:22px;
background:#ddd;
border-radius:999px;
overflow:hidden;
margin-top:8px;
}
.hp{
height:100%;
background:#ef4444;
transition:.4s;
}
.expr{
font-size:42px;
font-weight:900;
text-align:center;
padding:20px;
background:#ecfeff;
border-radius:18px;
margin:20px 0;
}
.message{
padding:16px;
background:#ecfdf5;
border-radius:16px;
margin-top:16px;
}
</style>
</head>

<body>

<div class="app">

<div class="title">
⚔️ 因数分解ハンターズ
</div>

<div class="sub">
ファクトリア地方へようこそ
</div>

<div class="card">

<h2 id="monster">
🌱ククリン出現！
</h2>

HP
<div class="bar">
<div id="hp" class="hp" style="width:100%">
</div>
</div>

<div class="expr" id="question">

x²−25

</div>

<h3>STEP1 何型？</h3>

<div class="row">

<button class="choice" onclick="selectType(this,'共通因数')">
共通因数
</button>

<button class="choice" onclick="selectType(this,'差の平方')">
差の平方
</button>

<button class="choice" onclick="selectType(this,'たすき')">
たすき
</button>

<button class="choice" onclick="selectType(this,'複合')">
複合
</button>

</div>

<h3>STEP2 因数分解！</h3>

<input id="answer"
placeholder="例：(x+5)(x-5)"
>

<div class="row">

<button class="blue"
onclick="attack()">
攻撃
</button>

<button class="green"
onclick="next()">
次の問題
</button>

<button class="yellow"
onclick="hint()">
ヒント
</button>

</div>

<div id="message"
class="message">

まず式の顔を見よう！

</div>

</div>

</div>

<script>

const problems=[

{
q:"x²−25",
type:"差の平方",
a:["(x+5)(x-5)",
"(x-5)(x+5)"],
hint:"25=5²"
},

{
q:"6x+12",
type:"共通因数",
a:["6(x+2)"],
hint:"6でくくれる"
},

{
q:"x²+8x+15",
type:"たすき",
a:["(x+3)(x+5)",
"(x+5)(x+3)"],
hint:"かけて15たして8"
}

];

let current=0;
let hp=100;
let selected="";

function selectType(btn,type){

document
.querySelectorAll(".choice")
.forEach(x=>x.classList.remove("selected"));

btn.classList.add("selected");

selected=type;

}

function normalize(x){

return x
.replace(/\s/g,"")
.replace(/[（]/g,"(")
.replace(/[）]/g,")")
.replace(/[＋]/g,"+")
.replace(/[−]/g,"-")
.toLowerCase()

}

function ok(ans){

return problems[current]
.a
.some(
x=>normalize(x)
===normalize(ans)
)

}

function attack(){

let ans=
document
.getElementById("answer")
.value;

if(selected==""){

msg(
"先に型を選ぼう！"
)

return

}

if(
selected==
problems[current].type
&&
ok(ans)
){

hp-=34;

if(hp<0)
hp=0;

document
.getElementById("hp")
.style.width=
hp+"%";

msg(
"会心の一撃！"
)

if(hp==0){

msg(
"🎉捕獲成功！"
)

}

}else{

msg(
"惜しい！確認してみよう"
)

}

}

function next(){

current++;

if(
current>=
problems.length
)
current=0;

document
.getElementById(
"question"
)
.innerHTML=
problems[current].q;

document
.getElementById(
"monster"
)
.innerHTML=
["🌱ククリン",
"💧スクエアム",
"🔥タスゴン"][current]
+" 出現！"

document
.getElementById(
"answer"
)
.value="";

selected="";

document
.querySelectorAll(
".choice"
)
.forEach(
x=>x.classList.remove(
"selected"
)
)

hp=100;

document
.getElementById(
"hp"
)
.style.width="100%";

msg(
"新しい敵だ！"
)

}

function hint(){

msg(
"ヒント："+
problems[current]
.hint
)

}

function msg(t){

document
.getElementById(
"message"
)
.innerHTML=t

}

</script>

</body>
</html>
