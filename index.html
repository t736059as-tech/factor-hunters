<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>因数分解ハンターズ Ver1.2</title>
<style>
*{box-sizing:border-box}body{margin:0;font-family:system-ui,sans-serif;background:linear-gradient(#1e3a8a,#047857,#111827);min-height:100vh;color:white}.app{max-width:1060px;margin:auto;padding:20px}.title{text-align:center;font-size:42px;font-weight:900}.sub{text-align:center;opacity:.9}.card{background:white;color:#111;border-radius:24px;padding:24px;margin:20px 0;box-shadow:0 20px 50px #0005}.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}.between{justify-content:space-between}.pill{background:#ffffff33;border-radius:999px;padding:6px 12px}.tabs{position:sticky;top:6px;background:white;color:#111;border-radius:22px;padding:8px;display:flex;gap:8px;flex-wrap:wrap;z-index:10}.tabs button.active,.selected{background:#10b981!important;color:white!important}button{padding:12px 16px;border:0;border-radius:12px;cursor:pointer;font-weight:700;background:#e5e7eb}.green{background:#10b981;color:white}.blue{background:#2563eb;color:white}.yellow{background:#eab308;color:white}.red{background:#ef4444;color:white}.orange{background:#f97316;color:white}input,select{width:100%;padding:14px;border-radius:12px;border:1px solid #ccc;margin-top:10px;font-size:16px}.bar{height:22px;background:#ddd;border-radius:999px;overflow:hidden;margin-top:8px}.hp{height:100%;background:#ef4444;transition:.4s}.expr{font-size:42px;font-weight:900;text-align:center;padding:20px;background:#ecfeff;border-radius:18px;margin:20px 0}.message{padding:16px;background:#ecfdf5;border-radius:16px;margin-top:16px}.warning{background:#fef9c3}.danger{background:#fee2e2}.success{background:#dcfce7}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:14px}.area{background:#f8fafc;border:2px solid #d1d5db;border-radius:18px;padding:16px}.unlocked{border-color:#34d399;background:#ecfdf5}.locked{opacity:.5}.notice{background:#fef3c7;color:#111;border-radius:16px;padding:12px;margin:12px 0}.dark{background:linear-gradient(90deg,#581c87,#000);color:white;border:4px solid #facc15}.small{font-size:12px;color:#666}.center{max-width:560px;margin:70px auto}.big{font-size:30px;font-weight:900}.gold{background:linear-gradient(90deg,#facc15,#fde68a,#f59e0b)!important;color:#111!important;border:3px solid #f59e0b}.talk{background:#eff6ff;border-left:8px solid #2563eb;border-radius:18px;padding:14px;margin:14px 0}.talk b{color:#1d4ed8}.shake{animation:shake .3s}@keyframes shake{0%{transform:translateX(0)}25%{transform:translateX(-4px)}50%{transform:translateX(4px)}75%{transform:translateX(-4px)}100%{transform:translateX(0)}}.flash{animation:flash .8s}@keyframes flash{0%{filter:brightness(1)}50%{filter:brightness(1.5)}100%{filter:brightness(1)}}.badge{display:inline-block;background:#ede9fe;color:#4c1d95;border-radius:999px;padding:6px 10px;margin:3px;font-size:13px;font-weight:700}@media(max-width:700px){.app{padding:12px}.title{font-size:32px}.expr{font-size:32px}.card{padding:18px}}
</style>
</head>
<body>
<div id="root"></div>
<script>
const problems=[
{q:'x²−25',type:'差の平方',a:['(x+5)(x-5)','(x-5)(x+5)'],hint:['25=5²','平方数どうしの引き算','a²-b²=(a+b)(a-b)'],monster:'💧スクエアム',lv:2,area:'双子の洞窟'},
{q:'x²−49',type:'差の平方',a:['(x+7)(x-7)','(x-7)(x+7)'],hint:['49=7²','左右対称','差の平方'],monster:'💧スクエアム',lv:2,area:'双子の洞窟'},
{q:'4x²−9',type:'差の平方',a:['(2x+3)(2x-3)','(2x-3)(2x+3)'],hint:['4x²=(2x)²','9=3²','差の平方'],monster:'💧スクエアム',lv:3,area:'双子の洞窟'},
{q:'6x+12',type:'共通因数',a:['6(x+2)'],hint:['共通する数は？','6xと12を見る','6でくくれる'],monster:'🌱ククリン',lv:1,area:'始まりの草原'},
{q:'3x²+9x',type:'共通因数',a:['3x(x+3)'],hint:['文字も見る','3とxが共通','3xでくくる'],monster:'🌱ククリン',lv:1,area:'始まりの草原'},
{q:'5x²−15x',type:'共通因数',a:['5x(x-3)'],hint:['5とxは？','負号に注意','5xでくくる'],monster:'🌱ククリン',lv:2,area:'始まりの草原'},
{q:'x²+8x+15',type:'たすき',a:['(x+3)(x+5)','(x+5)(x+3)'],hint:['かけて15','たして8','3と5'],monster:'🔥タスゴン',lv:3,area:'たすき火山'},
{q:'x²−7x+12',type:'たすき',a:['(x-3)(x-4)','(x-4)(x-3)'],hint:['かけて12','たして-7','-3と-4'],monster:'🔥タスゴン',lv:3,area:'たすき火山'},
{q:'2x²+7x+3',type:'たすき',a:['(2x+1)(x+3)','(x+3)(2x+1)'],hint:['2×3','たして7','たすき図'],monster:'🔥タスゴン',lv:4,area:'たすき火山'},
{q:'5x²−45',type:'複合',a:['5(x+3)(x-3)','5(x-3)(x+3)'],hint:['5でくくる','差の平方','2段階'],monster:'👤シャドウ・ファクター',lv:5,area:'幻影遺跡'}
];
const TYPES=['共通因数','差の平方','たすき','複合'];const root=document.getElementById('root');
let state={profile:getProfile(),tab:'battle',q:choice(problems),type:'',ans:'',enemyHp:100,msg:'まず式の顔を見よう！',result:'',hintLv:0,xp:num('fh_xp',0),captured:num('fh_captured',0),streak:num('fh_streak',0),combo:num('fh_combo',0),rank:'-',time:20,mode:'normal',rare:false,lastCapture:'',gaku:num('fh_gaku',0),suu:num('fh_suu',0),scene:'',lastLevel:num('fh_last_level',1),raidHp:num('fh_raid',83500),history:JSON.parse(localStorage.getItem('fh_history')||'[]')};let timer=null;
function num(k,f){return Number(localStorage.getItem(k))||f}function save(){localStorage.setItem('fh_xp',state.xp);localStorage.setItem('fh_captured',state.captured);localStorage.setItem('fh_streak',state.streak);localStorage.setItem('fh_combo',state.combo);localStorage.setItem('fh_gaku',state.gaku);localStorage.setItem('fh_suu',state.suu);localStorage.setItem('fh_raid',state.raidHp);localStorage.setItem('fh_last_level',level());localStorage.setItem('fh_history',JSON.stringify(state.history.slice(-40)))}function level(){return Math.floor(state.xp/100)+1}function choice(a){return a[Math.floor(Math.random()*a.length)]}function getProfile(){try{return JSON.parse(localStorage.getItem('fh_profile'))}catch{return null}}function norm(x){return String(x).replace(/\s/g,'').replace(/[（]/g,'(').replace(/[）]/g,')').replace(/[＋]/g,'+').replace(/[−ー－]/g,'-').replace(/[ｘＸX]/g,'x').replace(/[０-９]/g,s=>String.fromCharCode(s.charCodeAt(0)-65248)).toLowerCase()}function split(x){let m=norm(x).match(/\([^()]+\)|[^()]+(?=\(|$)/g);return (m||[norm(x)]).map(v=>v.replace(/[()]/g,'')).filter(Boolean).sort().join('|')}function ok(ans){return state.q.a.some(a=>norm(a)===norm(ans)||split(a)===split(ans))}
function register(){let no=document.getElementById('no').value.trim(),name=document.getElementById('name').value.trim(),team=document.getElementById('team').value;if(!no||!name){alert('出席番号と名前を入力してね');return}state.profile={no,name,team};localStorage.setItem('fh_profile',JSON.stringify(state.profile));render();startTimer()}function startTimer(){clearInterval(timer);state.time=20;timer=setInterval(()=>{if(state.tab==='battle'&&state.time>0){state.time--;drawHeaderOnly()}},1000)}function drawHeaderOnly(){let t=document.getElementById('timer');if(t)t.textContent='⏱️ '+state.time+'s'}
function selectType(t){state.type=t;render(false)}function setTab(t){state.tab=t;render()}function setMode(m){state.mode=m;render(false)}function inputChange(v){state.ans=v}
function pushHistory(correct,rank){state.history.push({q:state.q.q,type:state.q.type,selected:state.type,correct,rank,hints:state.hintLv,time:20-state.time});}
function attack(){if(!state.type){state.msg='先に型を選ぼう！';state.result='warning';return render(false)}if(!state.ans.trim()){state.msg='答えを入力してから攻撃しよう！';state.result='warning';return render(false)}if(state.type===state.q.type&&ok(state.ans)){let oldLevel=level();let r=state.time>=15&&state.hintLv===0?'S':state.time>=10?'A':state.time>=5?'B':'C';let dmg=30+state.q.lv*10+state.combo*5+(r==='S'?50:0);state.enemyHp=Math.max(0,state.enemyHp-dmg);state.raidHp=Math.max(0,state.raidHp-(r==='S'?500:150));state.xp+=20+state.q.lv*5+(r==='S'?20:0);state.combo++;state.streak++;state.rank=r;state.rare=state.streak>=10;state.result='success';state.scene=r==='S'?'gold flash':'';state.msg=r==='S'?'⚡ PERFECT HUNTER!! S判定クリティカル！':`【${r}判定】見抜き成功！${dmg}ダメージ！`;if(state.enemyHp===0){state.captured++;state.lastCapture=state.q.monster+' を捕獲！ 図鑑に登録された！';state.msg+=' 🎉捕獲成功！';state.scene='gold flash shake'}if(level()>oldLevel){state.msg+=' 🎉LEVEL UP！新しいエリアが近づいた！'}pushHistory(true,r);save();console.log('Teacher Sync Demo',{student:state.profile,problem:state.q.q,type:state.q.type,rank:r,input:state.ans});}else{state.combo=0;state.streak=0;state.rank='-';state.rare=false;state.scene='shake';state.result=state.type!==state.q.type?'danger':'warning';state.msg=state.type!==state.q.type?`型が違う！これは「${state.q.type}」の特徴を持っているぞ。`:'型は合っている！式や符号を確認しよう。';pushHistory(false,'-');save()}render(false)}
function nextQ(){state.q=choice(problems);state.type='';state.ans='';state.enemyHp=100;state.hintLv=0;state.rank='-';state.result='';state.scene='';state.lastCapture='';state.msg='新しい敵だ！まず式の顔を見よう！';render();startTimer()}function hint(){state.hintLv=Math.min(state.hintLv+1,state.q.hint.length);state.msg='ヒント'+state.hintLv+'：'+state.q.hint[state.hintLv-1];state.result='warning';render(false)}function addPart(p){state.ans+=p;render(false)}function clearAns(){state.ans='';render(false)}function parts(){let base=state.q.a[0].split(')').map(x=>x.trim()).filter(Boolean).map(x=>x+')');return [...new Set([...base,'(x+1)','(x-1)','(x+2)','(x-2)','(x+3)','(x-3)','(x+5)','(x-5)','2x','3x'])].slice(0,10)}
function loginHTML(){return `<div class="app"><div class="card center"><h1>⚔️ 因数分解ハンターズ</h1><h2>🧑‍🎓ハンター登録</h2><input id="no" placeholder="出席番号"><input id="name" placeholder="名前"><select id="team"><option>1班</option><option>2班</option><option>3班</option><option>4班</option><option>5班</option><option>6班</option></select><button class="green" onclick="register()">冒険を始める</button><p class="small">登録内容はこのブラウザに保存されます。</p></div></div>`}
function talk(){let line=state.q.type==='差の平方'?'スウ「左右対称の匂いがする…」<br><b>ファクト博士</b>「平方数どうしの引き算を見抜くのじゃ！」':state.q.type==='共通因数'?'スウ「同じものが隠れている気がする」<br><b>ファクト博士</b>「共通する力をくくり出すのじゃ！」':state.q.type==='たすき'?'スウ「組み合わせが鍵になりそうだ」<br><b>ファクト博士</b>「かけて、たして、式の顔を整えるのじゃ！」':'スウ「一手では終わらない…」<br><b>ファクト博士</b>「まず何をすべきかを見抜け！」';return `<div class="talk"><b>会話</b><br>${line}</div>`}
function header(){return `<div class="title">⚔️ 因数分解ハンターズ</div><div class="sub">ファクトリア地方へようこそ</div><div class="row" style="justify-content:center;margin:12px"><span class="pill">${state.profile.no}番 ${state.profile.name}</span><span class="pill">${state.profile.team}</span><span class="pill">Lv.${level()}</span><span class="pill">XP:${state.xp}</span><span class="pill">捕獲:${state.captured}</span><span class="pill">連勝:${state.streak}</span><button onclick="localStorage.removeItem('fh_profile');location.reload()">登録やり直し</button></div><div class="tabs">${['battle:⚔️冒険','map:🗺️マップ','book:📖図鑑','gaku:🔥ガク戦','raid:👑レイド','teacher:📊教師'].map(x=>{let [id,l]=x.split(':');return `<button class="${state.tab===id?'active':''}" onclick="setTab('${id}')">${l}</button>`}).join('')}</div>`}
function battle(){return `<div class="card ${state.scene}"><h2>${state.rare?'✨古代スクエアム（レア）':state.q.monster} 出現！</h2>${talk()}${state.lastCapture?`<div class="notice big">${state.lastCapture}</div>`:''}<div class="row between"><b>敵HP</b><span>${state.enemyHp}/100</span></div><div class="bar"><div class="hp" style="width:${state.enemyHp}%"></div></div><div class="expr">${state.q.q}</div><div class="row between"><span id="timer">⏱️ ${state.time}s</span><b class="${state.rank==='S'?'gold':''}">ランク：${state.rank}</b></div><h3>STEP1 何型？</h3><div class="row">${TYPES.map(t=>`<button class="${state.type===t?'selected':''}" onclick="selectType('${t}')">${t}</button>`).join('')}</div><h3>STEP2 因数分解！</h3><div class="row">${['easy:🟢かんたん','normal:🔵ふつう','hunter:🔴ハンター'].map(x=>{let [id,l]=x.split(':');return `<button class="${state.mode===id?'selected':''}" onclick="setMode('${id}')">${l}</button>`}).join('')}</div>${state.mode==='easy'?`<div class="notice"><b>因数パーツを選ぼう</b><div class="row">${parts().map(p=>`<button onclick="addPart('${p}')">${p}</button>`).join('')}</div><button onclick="clearAns()">入力クリア</button></div>`:''}<input value="${state.ans}" oninput="inputChange(this.value)" placeholder="例：(x+5)(x-5)"><div class="row"><button class="blue" onclick="attack()">攻撃</button><button class="green" onclick="nextQ()">次の問題</button><button class="yellow" onclick="hint()">ヒント</button></div><div class="message ${state.result}"><b>📣 判定</b><p>${state.msg}</p><p>コンボ：${state.combo}　ヒント：${state.hintLv}/${state.q.hint.length}</p></div></div>`}
function map(){let areas=[['🌱','始まりの草原','共通因数',true],['💧','双子の洞窟','差の平方',state.captured>=1||level()>=2],['🌳','組み合わせの森','x²+ax+b',state.captured>=3||level()>=3],['🔥','たすき火山','たすき掛け',state.captured>=5||level()>=4],['🏺','幻影遺跡','複合問題',state.captured>=8||state.streak>=5],['👑','式王城','発展・ボス',state.captured>=12||level()>=6]];return `<div class="card"><h2>🗺️ワールドマップ</h2><div class="grid">${areas.map(a=>`<div class="area ${a[3]?'unlocked':'locked'}"><h2>${a[0]}</h2><b>${a[1]}</b><p>${a[2]}</p><small>${a[3]?'解放済み':'未解放'}</small></div>`).join('')}</div></div>`}
function book(){let m=[['🌱','ククリン','共通因数',true],['💧','スクエアム','差の平方',state.captured>=1],['🔥','タスゴン','たすき',state.captured>=5],['✨','古代スクエアム','レア',state.rare],['👤','シャドウ・ファクター','複合',state.captured>=8]];return `<div class="card"><h2>📖モンスター図鑑</h2><div class="grid">${m.map(x=>`<div class="area unlocked">${x[3]?`<h2>${x[0]}</h2><b>${x[1]}</b><p>属性：${x[2]}</p><div class="notice">次の進化：？？？</div>`:`<h2>❔</h2><b>？？？？？</b><p>未発見</p>`}</div>`).join('')}</div></div>`}
function gaku(){return `<div class="card"><h2>🔥ガクとのライバル戦</h2><p>ガク『スウ！今日は5問先取勝負だ！』</p><div class="grid"><div class="area unlocked"><h2>🧠スウ</h2><p>勝利数：${state.suu}</p><p>観察型</p></div><div class="area unlocked"><h2>🔥ガク</h2><p>勝利数：${state.gaku}</p><p>スピード型</p></div></div><div class="notice"><b>ガクのミス例</b><p>x²−25 → たすき！</p><p>ガク『くっ…また式の顔か…！』</p></div><button class="orange" onclick="state.suu++;save();render()">ガクに1勝する</button><button onclick="state.gaku++;save();render()">ガクが1勝する</button></div>`}
function raid(){return `<div class="card dark"><h2>👑協力レイド：式王</h2><p>ファクト博士『全員の力が必要じゃ！』</p><div class="bar"><div class="hp" style="width:${state.raidHp/1000}%"></div></div><p>HP ${state.raidHp.toLocaleString()} / 100,000</p><div class="notice">通常正解で150ダメージ、S判定で500ダメージ！</div></div>`}
function teacher(){let total=state.history.length||1, correct=state.history.filter(h=>h.correct).length, s=state.history.filter(h=>h.rank==='S').length;let rate=Math.round(correct/total*100);return `<div class="card"><h2>📊ファクト分析室</h2><div class="grid"><div class="area"><b>総解答</b><h2>${state.history.length}</h2></div><div class="area"><b>正答率</b><h2>${rate}%</h2></div><div class="area"><b>S判定</b><h2>${s}回</h2></div></div><div class="notice">🤖提案：正答率が下がった型を次の授業で比較活動にすると効果的です。</div><h3>最近のログ</h3>${state.history.slice(-8).reverse().map(h=>`<div class="area"><b>${h.q}</b>｜${h.type}｜${h.correct?'正解':'ミス'}｜${h.rank}</div>`).join('')}</div>`}
function render(reset=true){if(!state.profile){root.innerHTML=loginHTML();return}root.innerHTML=`<div class="app">${header()}${state.tab==='battle'?battle():state.tab==='map'?map():state.tab==='book'?book():state.tab==='gaku'?gaku():state.tab==='raid'?raid():teacher()}</div>`}
render();if(state.profile)startTimer();
</script>
</body>
</html>
