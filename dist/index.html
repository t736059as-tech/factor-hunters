<!doctype html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>因数分解ハンターズ</title><style>
body{margin:0;font-family:system-ui;background:linear-gradient(#1e3a8a,#047857,#1c1917);min-height:100vh;color:white}.app{max-width:900px;margin:auto;padding:24px}.card{background:white;color:#111;border-radius:28px;padding:24px;margin:20px 0;box-shadow:0 20px 50px #0005}button,input{font:inherit;border-radius:14px;padding:10px;margin:4px}button{border:0;background:#e5e7eb;font-weight:700}button.sel{background:#10b981;color:white}.expr{font-size:42px;text-align:center;font-weight:900;background:#ecfeff;border-radius:20px;padding:20px}.bar{height:20px;background:#555;border-radius:999px;overflow:hidden}.hp{height:100%;background:#ef4444}.notice{background:#fef3c7;color:#111;padding:12px;border-radius:14px}.tabs{position:sticky;top:8px;background:white;color:#111;border-radius:22px;padding:8px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px}.area{background:#f8fafc;border:2px solid #34d399;border-radius:18px;padding:14px}
</style></head><body><div class="app"><h1>因数分解ハンターズ Ver1.0</h1><p>完成配布用・簡易スタンドアロン版</p><div class="tabs"><button onclick="tab('battle')">⚔️冒険</button><button onclick="tab('book')">📖図鑑</button><button onclick="tab('raid')">👑レイド</button></div><div id="main"></div></div><script>
const probs=[['x²−25','差の平方',['(x+5)(x-5)','(x-5)(x+5)'],'スクエアム'],['6x+12','共通因数',['6(x+2)'],'ククリン'],['x²+8x+15','たすき',['(x+3)(x+5)','(x+5)(x+3)'],'タスゴン']];
let p=probs[0],hp=620,type='',msg='まず型を見抜こう！';
function norm(s){return String(s).replace(/\s/g,'').replace(/[−ー－]/g,'-').replace(/[＋]/g,'+').replace(/[（]/g,'(').replace(/[）]/g,')').replace(/[ｘＸX]/g,'x').replace(/[０-９]/g,x=>String.fromCharCode(x.charCodeAt(0)-65248)).toLowerCase()}
function parts(s){let m=norm(s).match(/\([^()]+\)|[^()]+(?=\(|$)/g);return (m||[norm(s)]).map(x=>x.replace(/[()]/g,'')).filter(Boolean).sort().join('|')}
function same(a,arr){return arr.some(c=>norm(a)==norm(c)||parts(a)==parts(c))}
function newQ(){p=probs[Math.floor(Math.random()*probs.length)];type='';msg='新しい式が現れた！';renderBattle()}
function attack(){let ans=document.getElementById('ans').value;if(!type){msg='先に型を選ぼう！';return renderBattle()} if(same(ans,p[2])&&type==p[1]){hp=Math.max(0,hp-300);msg='見抜き成功！300ダメージ！'}else{msg=type!=p[1]?'型が違う！':'型は合っている！式を確認！'} renderBattle()}
function tab(t){if(t=='battle')renderBattle();if(t=='book')document.getElementById('main').innerHTML='<div class=card><h2>📖図鑑</h2><div class=grid><div class=area>🌱 ククリン<br>共通因数</div><div class=area>💧 スクエアム<br>差の平方</div><div class=area>🔥 タスゴン<br>たすき</div></div></div>';if(t=='raid')document.getElementById('main').innerHTML='<div class=card><h2>👑式王レイド</h2><p>クラス全員でHPを削ろう！</p><div class=bar><div class=hp style="width:83%"></div></div></div>'}
function renderBattle(){document.getElementById('main').innerHTML=`<div class=card><h2>⚔️バトル</h2><p>${p[3]}が現れた！</p><div class=bar><div class=hp style="width:${hp/10}%"></div></div><div class=expr>${p[0]}</div><h3>何型？</h3>${['共通因数','差の平方','たすき','複合'].map(x=>`<button class="${type==x?'sel':''}" onclick="type='${x}';renderBattle()">${x}</button>`).join('')}<h3>因数分解</h3><input id=ans placeholder="例：(x+5)(x-5)"><br><button onclick=attack()>攻撃する</button><button onclick=newQ()>次の式へ</button><div class=notice>${msg}</div></div>`}
renderBattle();
</script></body></html>
